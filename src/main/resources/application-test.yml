spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8081
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    project.food: DEBUG
    org.springframework: INFO