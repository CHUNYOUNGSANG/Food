services:
  mysql:
    image: mysql:8.0
    container_name: food-mysql
    ports:
      - "3307:3306"
    env_file:
      - .env.dev
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

  redis:
    image: redis:7-alpine
    container_name: food-redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  mysql-data: